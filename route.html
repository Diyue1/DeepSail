<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DeepSail 航线监控 - 实时海运航线规划与船舶追踪">
    <meta name="theme-color" content="#00b4fc">
    <title>航线监控 - DeepSail 远洋导航</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="/js/common.js" defer></script>

    <style>
        :root {
            --blue-deep: #0e1336;
            --blue-glow: #00b4fc;
            --blue-dark: #202748;
            --gold: #ffd43b;
            --navy: #131c37;
            --theme-light-bg: linear-gradient(135deg, #eff6ff 0%, #b6e2ff 100%);
            --theme-dark-bg: linear-gradient(135deg, #0e1336 0%, #202748 80%, #1d2548 100%);
        }
        html, body {
            min-height: 100vh;
            background: var(--theme-dark-bg);
            color: #fff;
            font-family: 'Roboto', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* ── Skeleton ── */
        .skeleton {
            background: linear-gradient(90deg, #1a2550 25%, #263060 50%, #1a2550 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.5s infinite;
            border-radius: 4px;
        }
        @keyframes skeleton-shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton-map {
            width: 100%;
            height: 100%;
            min-height: 300px;
        }
        .skeleton-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: #adb5bd;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0,180,252,0.3);
            border-top-color: #00b4fc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Navbar ── */
        .navbar {
            width: 100vw;
            height: 64px;
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(24,32,61,0.92);
            box-shadow: 0 2px 12px #0e133622;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 0 24px;
            transition: background 0.2s, transform 0.3s;
        }
        .navbar.hidden { transform: translateY(-100%); }
        .brand {
            font-size: 22px;
            font-weight: 700;
            color: #00b4fc;
            display: flex;
            align-items: center;
            gap: 10px;
            user-select: none;
            animation: brandGlow 2.8s infinite alternate;
        }
        @keyframes brandGlow {
            0% { filter: drop-shadow(0 0 4px #00b4fc); }
            100% { filter: drop-shadow(0 0 14px #00f6fc); }
        }
        .navbar .nav-menu { display: flex; gap: 10px; align-items: center; }
        .nav-btn {
            padding: 7px 18px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(90deg, #00b4fc 0%, #2563eb 100%);
            color: #fff; font-size: 14px; font-weight: 500;
            cursor: pointer;
            transition: background 0.16s, color 0.18s;
            text-decoration: none;
            display: inline-block;
        }
        .nav-btn:hover, .nav-btn:focus {
            color: #ffd43b;
            background: linear-gradient(90deg, #2563eb 0%, #00b4fc 100%);
            outline: 2px solid #00b4fc;
            outline-offset: 2px;
        }
        .nav-btn.active { color: #ffd43b; }
        .theme-toggle {
            background: none; border: none; color: #fff;
            font-size: 21px; margin-left: 12px; cursor: pointer;
            padding: 4px; border-radius: 4px;
        }
        .theme-toggle:hover { color: #ffd43b; }
        .navbar-toggle {
            position: fixed; top: 50%; left: 0;
            transform: translateY(-50%);
            z-index: 50;
            background: #00b4fc; color: #fff;
            border: none; border-radius: 0 10px 10px 0;
            width: 36px; height: 36px; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 2px 0 8px #00b4fc33;
            transition: all 0.3s; opacity: 0.85;
        }
        .navbar-toggle:hover, .navbar-toggle:focus { opacity: 1; background: #2563eb; }

        /* ── Sidebar ── */
        .sidebar {
            position: fixed;
            left: 0; top: 64px; bottom: 0;
            width: 230px;
            background: rgba(22,32,61,0.98);
            box-shadow: 2px 0 18px #1a237e22;
            z-index: 30;
            transition: transform 0.3s cubic-bezier(.65,0,.42,1.04);
            display: flex; flex-direction: column; gap: 10px;
            padding: 24px 12px 0;
        }
        .sidebar.collapsed { transform: translateX(-230px); }
        .sidebar-toggle {
            position: absolute; top: 22px; right: -18px;
            background: #00b4fc; color: #fff;
            border: none; border-radius: 10px 0 0 10px;
            width: 36px; height: 36px; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .sidebar-btn {
            background: linear-gradient(90deg, #2563eb 0%, #00b4fc 100%);
            border: none; color: #fff; font-size: 15px; font-weight: 500;
            border-radius: 10px; padding: 10px 16px; cursor: pointer;
            transition: background 0.17s; text-align: left;
            text-decoration: none; display: block;
        }
        .sidebar-btn.active, .sidebar-btn:hover, .sidebar-btn:focus {
            color: #ffd43b;
            background: linear-gradient(90deg, #00b4fc 0%, #2563eb 100%);
            outline: none;
        }
        .sidebar-content {
            margin-top: 8px; color: #adb5bd;
            font-size: 13px; line-height: 1.7; padding: 0 4px;
        }

        /* ── Layout ── */
        .main-content {
            margin-left: 230px;
            transition: margin-left 0.3s cubic-bezier(.65,0,.42,1.04);
            height: calc(100vh - 64px);
            margin-top: 64px;
            display: flex;
            flex-direction: column;
        }
        .main-content.expanded { margin-left: 0; }

        /* ── Map Area ── */
        #amap {
            flex: 1;
            width: 100%;
            background: #1a2550;
            position: relative;
            overflow: hidden;
            min-height: 300px;
        }
        #map-skeleton {
            position: absolute;
            inset: 0;
            z-index: 5;
        }

        /* ── Route Info Bar ── */
        .route-info {
            padding: 10px 20px;
            background: rgba(30, 38, 67, 0.97);
            color: #fff;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 13px;
            border-top: 1px solid rgba(0,180,252,0.3);
            flex-shrink: 0;
        }
        .route-info-item { display: flex; align-items: center; gap: 6px; }
        .route-info-value { font-weight: 700; color: var(--gold); }

        /* ── Control Panel ── */
        .control-panel {
            padding: 10px 20px;
            background: rgba(24,32,61,0.97);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            flex-shrink: 0;
            border-top: 1px solid rgba(0,180,252,0.15);
        }
        .control-inputs { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .control-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

        .port-label { font-weight: 500; color: #adb5bd; font-size: 13px; white-space: nowrap; }
        .port-input {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid rgba(0,180,252,0.4);
            background: rgba(14,19,54,0.8);
            color: #fff;
            width: 130px;
            font-size: 13px;
            transition: border-color 0.2s;
        }
        .port-input:focus {
            outline: none;
            border-color: #00b4fc;
            box-shadow: 0 0 0 2px rgba(0,180,252,0.2);
        }

        .action-btn {
            padding: 7px 18px;
            border-radius: 6px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .action-btn-primary { background: #00b4fc; color: #fff; }
        .action-btn-primary:hover, .action-btn-primary:focus {
            background: #2563eb;
            outline: 2px solid #00b4fc;
        }
        .action-btn-danger { background: #e74c3c; color: #fff; }
        .action-btn-danger:hover, .action-btn-danger:focus {
            background: #c0392b;
            outline: 2px solid #e74c3c;
        }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #routeMsg {
            color: #ffd43b;
            font-size: 13px;
            min-width: 120px;
            role: status;
        }

        /* ── Error display ── */
        .error-banner {
            background: rgba(231,76,60,0.15);
            border: 1px solid #e74c3c;
            border-radius: 6px;
            padding: 8px 14px;
            color: #fff;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ── Windy overlay ── */
        .windy-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s, visibility 0.5s;
        }
        .windy-overlay.active {
            opacity: 0.7;
            visibility: visible;
        }
        .windy-iframe { width: 100%; height: 100%; border: none; }

        .weather-toggle {
            position: absolute;
            top: 12px; right: 12px;
            z-index: 20;
            background: rgba(14,19,54,0.85);
            color: #fff;
            border: none; border-radius: 6px;
            padding: 7px 13px; font-size: 13px;
            cursor: pointer;
            display: flex; align-items: center; gap: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }
        .weather-toggle:hover { background: rgba(0,180,252,0.8); }
        .weather-toggle.active { background: rgba(255,212,59,0.8); color: #0e1336; }

        .windy-controls {
            position: absolute;
            bottom: 12px; right: 12px;
            z-index: 20;
            background: rgba(14,19,54,0.88);
            border-radius: 6px; padding: 8px;
            display: none; flex-direction: column; gap: 6px;
        }
        .windy-controls.active { display: flex; }
        .windy-control-btn {
            background: rgba(0,180,252,0.6); color: #fff;
            border: none; border-radius: 4px;
            padding: 5px 10px; font-size: 12px; cursor: pointer;
            transition: background 0.2s;
        }
        .windy-control-btn:hover { background: rgba(0,180,252,0.9); }
        .windy-control-slider { width: 100%; margin: 4px 0; }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .sidebar { width: 65vw; max-width: 220px; }
            .sidebar.collapsed { transform: translateX(-65vw); }
            .main-content { margin-left: 0; }
        }
        @media (max-width: 768px) {
            .control-inputs { gap: 8px; }
            .port-input { width: 110px; }
            .nav-btn { padding: 6px 10px; font-size: 13px; }
        }
        @media (max-width: 600px) {
            .navbar { padding: 0 12px; }
            .brand { font-size: 16px; }
            .sidebar { transform: translateX(-100%); }
            .control-panel { flex-direction: column; align-items: flex-start; }
            .control-inputs { flex-direction: column; align-items: flex-start; }
            .port-input { width: 100%; }
        }
        @media (prefers-reduced-motion: reduce) {
            .navbar, .sidebar, .main-content { transition: none; }
            .skeleton { animation: none; background: #1a2550; }
            .loading-spinner { animation: none; }
        }
    </style>
</head>
<body>
    <button class="navbar-toggle" id="navbarToggle"
            aria-label="显示导航栏" aria-controls="navbar" aria-expanded="false">▼</button>

    <nav class="navbar" id="navbar" role="navigation" aria-label="主导航">
        <div class="brand">
            <svg width="26" height="26" viewBox="0 0 100 100" aria-hidden="true" focusable="false">
                <circle cx="50" cy="50" r="46" fill="none" stroke="#00b4fc" stroke-width="7"/>
                <circle cx="50" cy="50" r="33" fill="#ffd43b" opacity="0.20"/>
                <circle cx="50" cy="50" r="23" fill="#00b4fc" opacity="0.60"/>
            </svg>
            远洋导航
        </div>
        <div class="nav-menu">
            <a class="nav-btn" href="index.html">主页</a>
            <a class="nav-btn active" href="route.html" aria-current="page">航线</a>
            <a class="nav-btn" href="weather.html">气象</a>
            <a class="nav-btn" href="port.html">港口</a>
            <button class="theme-toggle" id="themeBtn" aria-label="切换主题">🌓</button>
        </div>
    </nav>

    <aside class="sidebar" id="sidebar" role="complementary" aria-label="功能导航">
        <button class="sidebar-toggle" id="sidebarToggleBtn" aria-label="收起侧边栏">◀</button>
        <a class="sidebar-btn" href="index.html">🏠 主页</a>
        <a class="sidebar-btn" href="weather.html">🌦️ 气象风速</a>
        <a class="sidebar-btn active" href="route.html" aria-current="page">🛳️ 航线监控</a>
        <a class="sidebar-btn" href="port.html">⚓ 港口信息</a>
        <div class="sidebar-content" id="sidebarContent" aria-live="polite">
            <strong>常用港口：</strong><br>
            上海、广州、天津、青岛、新加坡、釜山、鹿特丹、洛杉矶
        </div>
    </aside>

    <div class="main-content" id="mainContent">
        <main id="main-route-area" tabindex="-1" aria-label="航线监控区域">

            <!-- Map container -->
            <div id="amap" role="region" aria-label="航线地图">
                <!-- Skeleton loader -->
                <div id="map-skeleton" class="skeleton skeleton-map" aria-busy="true" aria-label="地图加载中">
                    <div class="skeleton-overlay">
                        <div class="loading-spinner" aria-hidden="true"></div>
                        <span>地图加载中...</span>
                    </div>
                </div>

                <!-- Windy overlay -->
                <div class="windy-overlay" id="windyOverlay" aria-label="气象图层">
                    <iframe class="windy-iframe" id="windyIframe"
                            title="Windy气象图层" frameborder="0"
                            loading="lazy"></iframe>
                </div>

                <!-- Weather toggle button -->
                <button class="weather-toggle" id="weatherToggle" aria-pressed="false"
                        aria-label="显示气象图层">
                    🌦️ 显示气象图层
                </button>

                <!-- Windy controls -->
                <div class="windy-controls" id="windyControls" role="group" aria-label="气象图层控制">
                    <button class="windy-control-btn" id="windLayerBtn">风力图层</button>
                    <button class="windy-control-btn" id="rainLayerBtn">降水图层</button>
                    <button class="windy-control-btn" id="tempLayerBtn">温度图层</button>
                    <button class="windy-control-btn" id="wavesLayerBtn">海浪图层</button>
                    <div>
                        <label for="opacitySlider" style="color:#fff;font-size:11px;display:block;margin-bottom:3px;">
                            透明度
                        </label>
                        <input type="range" id="opacitySlider" min="10" max="90" value="70"
                               class="windy-control-slider" aria-label="气象图层透明度">
                    </div>
                    <button class="windy-control-btn" id="syncMapBtn">同步地图位置</button>
                </div>
            </div>

            <!-- Route Info -->
            <div class="route-info" role="status" aria-live="polite" aria-label="航线信息">
                <div class="route-info-item">
                    <span>总距离:</span>
                    <span id="totalDistance" class="route-info-value">—</span>
                    <span>海里</span>
                </div>
                <div class="route-info-item">
                    <span>预计航行时间:</span>
                    <span id="estimatedTime" class="route-info-value">—</span>
                    <span>天（按平均航速20节）</span>
                </div>
            </div>

            <!-- Control Panel -->
            <div class="control-panel">
                <div class="control-inputs">
                    <label class="port-label" for="startPortName">出发港口:</label>
                    <input id="startPortName" type="text" class="port-input"
                           placeholder="如：上海" aria-label="出发港口名称"
                           autocomplete="off" list="port-suggestions">
                    <label class="port-label" for="endPortName">目的港口:</label>
                    <input id="endPortName" type="text" class="port-input"
                           placeholder="如：广州" aria-label="目的港口名称"
                           autocomplete="off" list="port-suggestions">
                    <datalist id="port-suggestions">
                        <option value="上海"><option value="广州"><option value="天津">
                        <option value="青岛"><option value="宁波"><option value="大连">
                        <option value="深圳"><option value="厦门"><option value="新加坡">
                        <option value="釜山"><option value="鹿特丹"><option value="汉堡">
                        <option value="洛杉矶"><option value="伦敦"><option value="悉尼">
                    </datalist>
                </div>
                <div class="control-actions">
                    <button id="drawRouteBtn" class="action-btn action-btn-primary"
                            aria-label="查询并绘制航线">查询/绘制</button>
                    <button id="clearRouteBtn" class="action-btn action-btn-danger"
                            aria-label="清除当前航线">清理航线</button>
                    <div id="routeMsg" role="status" aria-live="polite" aria-label="航线状态"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Port code lookup table
        const PORT_CODES = {
            '上海': 'CNSHG', '上海港': 'CNSHG',
            '广州': 'CNGZG', '广州港': 'CNGZG',
            '天津': 'CNTXG', '天津港': 'CNTXG',
            '青岛': 'CNTAO', '青岛港': 'CNTAO',
            '宁波': 'CNNGB', '宁波港': 'CNNGB',
            '大连': 'CNDLC', '大连港': 'CNDLC',
            '深圳': 'CNSZX', '深圳港': 'CNSZX',
            '厦门': 'CNXMN', '厦门港': 'CNXMN',
            '东京': 'JPTYO', '东京港': 'JPTYO',
            '横滨': 'JPYOK', '横滨港': 'JPYOK',
            '大阪': 'JPOSA', '大阪港': 'JPOSA',
            '神户': 'JPUKB', '神户港': 'JPUKB',
            '釜山': 'KRPUS', '釜山港': 'KRPUS',
            '新加坡': 'SGSIN', '新加坡港': 'SGSIN',
            '洛杉矶': 'USLAX', '洛杉矶港': 'USLAX',
            '鹿特丹': 'NLRTM', '鹿特丹港': 'NLRTM',
            '汉堡': 'DEHAM', '汉堡港': 'DEHAM',
            '悉尼': 'AUSYD', '悉尼港': 'AUSYD',
            '伦敦': 'GBLON', '伦敦港': 'GBLON',
            '日本': 'JPTYO', '韩国': 'KRPUS',
            '美国': 'USLAX', '荷兰': 'NLRTM',
            '德国': 'DEHAM', '澳大利亚': 'AUSYD',
            '英国': 'GBLON'
        };

        let map = null;
        let currentPolyline = null;
        let currentMarkers = [];

        // ─── Load Amap dynamically (key from backend) ──────────────────
        async function loadMapAndInit() {
            try {
                // Fetch key from backend API (key never in HTML)
                const configRes = await fetch('/api/config');
                if (!configRes.ok) throw new Error('配置加载失败');
                const config = await configRes.json();

                await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = `https://webapi.amap.com/maps?v=2.0&key=${config.amapKey}`;
                    script.onload = resolve;
                    script.onerror = () => reject(new Error('高德地图SDK加载失败'));
                    document.head.appendChild(script);
                });

                initMap();
            } catch (err) {
                showMapError(err.message);
            }
        }

        function initMap() {
            // Hide skeleton, init map
            const skeleton = document.getElementById('map-skeleton');
            if (skeleton) skeleton.remove();

            map = new AMap.Map('amap', {
                zoom: 4,
                center: [130, 30],
                mapStyle: 'amap://styles/dark'
            });

            initWindyOverlay();
            // Load default route after map ready
            setTimeout(loadDefaultRoute, 800);
        }

        function showMapError(msg) {
            const skeleton = document.getElementById('map-skeleton');
            if (skeleton) {
                skeleton.classList.remove('skeleton');
                skeleton.style.animation = 'none';
                skeleton.style.background = 'rgba(14,19,54,0.9)';
                skeleton.innerHTML = `
                    <div class="skeleton-overlay">
                        <div role="alert" class="error-banner">
                            ⚠️ ${msg || '地图加载失败，请刷新页面重试'}
                        </div>
                        <button onclick="location.reload()" class="action-btn action-btn-primary"
                                style="margin-top:12px;">刷新页面</button>
                    </div>
                `;
            }
        }

        // ─── Route Operations ──────────────────────────────────────────────
        function getPortCode(name) {
            return PORT_CODES[name.trim()] || null;
        }

        function clearRoute() {
            if (currentPolyline) {
                if (Array.isArray(currentPolyline)) {
                    currentPolyline.forEach(pl => map.remove(pl));
                } else {
                    map.remove(currentPolyline);
                }
                currentPolyline = null;
            }
            currentMarkers.forEach(m => map.remove(m));
            currentMarkers = [];
            setRouteMsg('航线已清理', false);
            document.getElementById('totalDistance').textContent = '—';
            document.getElementById('estimatedTime').textContent = '—';
        }

        async function fetchRoute(startCode, endCode) {
            // Use cache if available
            const cacheKey = `route_${startCode}_${endCode}`;
            const cached = DeepSailCache.get(cacheKey);
            if (cached) return cached;

            // Call backend proxy (API key stays server-side)
            const res = await fetch(`/api/route?start=${startCode}&end=${endCode}`);
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.error || `HTTP ${res.status}`);
            }
            const data = await res.json();
            if (data.status !== 0) throw new Error(data.msg || 'API错误');

            // Cache for 1 hour
            DeepSailCache.set(cacheKey, data.data, 3600 * 1000);
            return data.data;
        }

        function drawRoute(routeData) {
            clearRoute();
            if (!routeData?.route || routeData.route.length < 2) {
                setRouteMsg('⚠️ 航线数据无效', true);
                return;
            }

            const path = routeData.route.map(p => [p.lng, p.lat]);

            const mkIcon = (color, size = 24) => new AMap.Icon({
                size: new AMap.Size(size, size),
                image: `data:image/svg+xml;base64,${btoa(`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${size/2-2}" fill="${color}" stroke="#fff" stroke-width="2"/></svg>`)}`
            });

            const startM = new AMap.Marker({
                position: path[0], map,
                icon: mkIcon('#00b4fc'),
                label: { content: '起点', direction: 'top' },
                title: '起点'
            });
            const endM = new AMap.Marker({
                position: path[path.length - 1], map,
                icon: mkIcon('#ffd43b'),
                label: { content: '终点', direction: 'top' },
                title: '终点'
            });
            currentMarkers.push(startM, endM);

            // Intermediate waypoints
            const step = Math.max(1, Math.floor(path.length / 8));
            for (let i = step; i < path.length - step; i += step) {
                const m = new AMap.Marker({
                    position: path[i], map,
                    icon: mkIcon('#00b4fc', 8),
                    title: `航点 ${i}`
                });
                currentMarkers.push(m);
            }

            const polyline = new AMap.Polyline({
                path, strokeColor: '#00b4fc', strokeWeight: 3,
                strokeOpacity: 0.85, lineJoin: 'round', lineCap: 'round',
                strokeDasharray: [10, 5], showDir: true, dirColor: '#ffd43b'
            });
            polyline.setMap(map);
            currentPolyline = polyline;

            const dist = parseFloat(routeData.distance).toFixed(1);
            const days = (routeData.distance / (20 * 24)).toFixed(1);
            document.getElementById('totalDistance').textContent = dist;
            document.getElementById('estimatedTime').textContent = days;

            map.setFitView([...currentMarkers, polyline]);
        }

        function setRouteMsg(msg, isError = false) {
            const el = document.getElementById('routeMsg');
            el.textContent = msg;
            el.style.color = isError ? '#e74c3c' : '#ffd43b';
        }

        // ─── Button Events ─────────────────────────────────────────────────
        document.getElementById('drawRouteBtn').addEventListener('click', async () => {
            const startName = document.getElementById('startPortName').value.trim();
            const endName = document.getElementById('endPortName').value.trim();
            if (!startName || !endName) {
                setRouteMsg('⚠️ 请输入出发和目的港口', true);
                return;
            }
            const startCode = getPortCode(startName);
            const endCode = getPortCode(endName);
            if (!startCode) { setRouteMsg(`⚠️ 未找到港口"${startName}"`, true); return; }
            if (!endCode) { setRouteMsg(`⚠️ 未找到港口"${endName}"`, true); return; }

            const btn = document.getElementById('drawRouteBtn');
            btn.disabled = true;
            setRouteMsg('查询中...', false);

            try {
                const data = await fetchRoute(startCode, endCode);
                drawRoute(data);
                setRouteMsg(`✅ ${startName} → ${endName} 航线规划成功`);
            } catch (err) {
                setRouteMsg(`⚠️ 获取航线失败: ${err.message}`, true);
            } finally {
                btn.disabled = false;
            }
        });

        document.getElementById('clearRouteBtn').addEventListener('click', clearRoute);

        // ─── Windy Overlay ─────────────────────────────────────────────────
        function initWindyOverlay() {
            const toggle = document.getElementById('weatherToggle');
            const overlay = document.getElementById('windyOverlay');
            const controls = document.getElementById('windyControls');
            const iframe = document.getElementById('windyIframe');
            const slider = document.getElementById('opacitySlider');
            let visible = false;
            let currentLayer = 'wind';

            function buildWindyUrl(layer) {
                if (!map) return '';
                const c = map.getCenter();
                const z = map.getZoom();
                return `https://embed.windy.com/embed2.html?lat=${c.lat}&lon=${c.lng}&zoom=${z}&level=surface&overlay=${layer}&product=ecmwf&menu=&message=&type=map&metricWind=default&metricTemp=%C2%B0C&radarRange=-1`;
            }

            toggle.addEventListener('click', () => {
                visible = !visible;
                overlay.classList.toggle('active', visible);
                controls.classList.toggle('active', visible);
                toggle.classList.toggle('active', visible);
                toggle.setAttribute('aria-pressed', visible.toString());
                toggle.textContent = visible ? '🌦️ 隐藏气象图层' : '🌦️ 显示气象图层';
                overlay.style.pointerEvents = visible ? 'auto' : 'none';
                if (visible) iframe.src = buildWindyUrl(currentLayer);
            });

            slider.addEventListener('input', () => {
                overlay.style.opacity = slider.value / 100;
            });

            const layerBtns = {
                windLayerBtn: 'wind', rainLayerBtn: 'rain',
                tempLayerBtn: 'temp', wavesLayerBtn: 'waves'
            };
            Object.entries(layerBtns).forEach(([id, layer]) => {
                document.getElementById(id).addEventListener('click', () => {
                    currentLayer = layer;
                    if (visible) iframe.src = buildWindyUrl(layer);
                });
            });

            document.getElementById('syncMapBtn').addEventListener('click', () => {
                if (visible) iframe.src = buildWindyUrl(currentLayer);
            });

            // Debounce map move sync
            if (map) {
                let syncTimer;
                map.on('moveend', () => {
                    if (!visible) return;
                    clearTimeout(syncTimer);
                    syncTimer = setTimeout(() => { iframe.src = buildWindyUrl(currentLayer); }, 600);
                });
            }
        }

        // ─── Default Route ─────────────────────────────────────────────────
        async function loadDefaultRoute() {
            document.getElementById('startPortName').value = '上海';
            document.getElementById('endPortName').value = '广州';
            try {
                const data = await fetchRoute('CNSHG', 'CNGZG');
                drawRoute(data);
            } catch {
                setRouteMsg('默认航线加载失败，请手动查询', true);
            }
        }

        // ─── Start ─────────────────────────────────────────────────────────
        window.addEventListener('load', loadMapAndInit);
    </script>
</body>
