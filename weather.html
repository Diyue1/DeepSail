<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DeepSail 海洋气象 - 潮汐、波浪、台风、海洋生态实时预报">
    <meta name="theme-color" content="#00b4fc">
    <title>海洋气象 - DeepSail 远洋导航</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="/js/common.js" defer></script>

    <style>
        :root {
            --blue-deep: #0e1336;
            --blue-glow: #00b4fc;
            --blue-dark: #202748;
            --gold: #ffd43b;
            --navy: #131c37;
            --theme-light-bg: linear-gradient(135deg, #eff6ff 0%, #b6e2ff 100%);
            --theme-dark-bg: linear-gradient(135deg, #0e1336 0%, #202748 80%, #1d2548 100%);
        }
        html, body {
            min-height: 100vh;
            background: var(--theme-dark-bg);
            color: #fff;
            font-family: 'Roboto', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* ── Skeleton ── */
        .skeleton {
            background: linear-gradient(90deg, #1a2550 25%, #263060 50%, #1a2550 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.5s infinite;
        }
        @keyframes skeleton-shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .iframe-skeleton {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            color: #adb5bd; flex-direction: column; gap: 12px;
        }
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0% { content: ''; } 25% { content: '.'; }
            50% { content: '..'; } 75% { content: '...'; }
        }

        /* ── Navbar ── */
        .navbar {
            width: 100vw; height: 64px;
            position: fixed; top: 0; left: 0; right: 0; z-index: 40;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(24,32,61,0.92);
            box-shadow: 0 2px 12px #0e133622;
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            padding: 0 24px;
            transition: background 0.2s, transform 0.3s;
        }
        .navbar.hidden { transform: translateY(-100%); }
        .brand {
            font-size: 22px; font-weight: 700; color: #00b4fc;
            display: flex; align-items: center; gap: 10px;
            user-select: none; animation: brandGlow 2.8s infinite alternate;
        }
        @keyframes brandGlow {
            0% { filter: drop-shadow(0 0 4px #00b4fc); }
            100% { filter: drop-shadow(0 0 14px #00f6fc); }
        }
        .navbar .nav-menu { display: flex; gap: 10px; align-items: center; }
        .nav-btn {
            padding: 7px 18px; border: none; border-radius: 20px;
            background: linear-gradient(90deg, #00b4fc 0%, #2563eb 100%);
            color: #fff; font-size: 14px; font-weight: 500; cursor: pointer;
            transition: background 0.16s; text-decoration: none; display: inline-block;
        }
        .nav-btn:hover, .nav-btn:focus {
            color: #ffd43b;
            background: linear-gradient(90deg, #2563eb 0%, #00b4fc 100%);
            outline: 2px solid #00b4fc; outline-offset: 2px;
        }
        .nav-btn.active { color: #ffd43b; }
        .theme-toggle {
            background: none; border: none; color: #fff;
            font-size: 21px; margin-left: 12px; cursor: pointer; padding: 4px;
        }
        .theme-toggle:hover { color: #ffd43b; }
        .navbar-toggle {
            position: fixed; top: 50%; left: 0; transform: translateY(-50%);
            z-index: 50; background: #00b4fc; color: #fff;
            border: none; border-radius: 0 10px 10px 0;
            width: 36px; height: 36px; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            opacity: 0.85; transition: all 0.3s;
        }
        .navbar-toggle:hover { opacity: 1; background: #2563eb; }

        /* ── Sidebar ── */
        .sidebar {
            position: fixed; left: 0; top: 64px; bottom: 0;
            width: 230px; background: rgba(22,32,61,0.98);
            box-shadow: 2px 0 18px #1a237e22; z-index: 30;
            transition: transform 0.3s cubic-bezier(.65,0,.42,1.04);
            display: flex; flex-direction: column; gap: 10px;
            padding: 24px 12px 0;
        }
        .sidebar.collapsed { transform: translateX(-230px); }
        .sidebar-toggle {
            position: absolute; top: 22px; right: -18px;
            background: #00b4fc; color: #fff;
            border: none; border-radius: 10px 0 0 10px;
            width: 36px; height: 36px; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .sidebar-btn {
            background: linear-gradient(90deg, #2563eb 0%, #00b4fc 100%);
            border: none; color: #fff; font-size: 15px; font-weight: 500;
            border-radius: 10px; padding: 10px 16px; cursor: pointer;
            transition: background 0.17s; text-align: left;
            text-decoration: none; display: block;
        }
        .sidebar-btn.active, .sidebar-btn:hover, .sidebar-btn:focus {
            color: #ffd43b;
            background: linear-gradient(90deg, #00b4fc 0%, #2563eb 100%);
            outline: none;
        }
        .sidebar-content {
            margin-top: 8px; color: #adb5bd; font-size: 13px; line-height: 1.8; padding: 0 4px;
        }
        .sidebar-content ul { padding-left: 18px; margin: 8px 0; }
        .sidebar-content li { margin-bottom: 4px; }

        /* ── Layout ── */
        .main-content {
            margin-left: 230px;
            transition: margin-left 0.3s cubic-bezier(.65,0,.42,1.04);
            height: calc(100vh - 64px);
            margin-top: 64px;
            display: flex; flex-direction: column;
        }
        .main-content.expanded { margin-left: 0; }

        /* ── Weather Container ── */
        .weather-container {
            display: flex; flex-direction: column; height: 100%; overflow: hidden;
        }

        /* ── Tabs ── */
        .weather-tabs {
            display: flex;
            background: rgba(24,32,61,0.97);
            border-bottom: 2px solid rgba(0,180,252,0.3);
            padding: 0 16px;
            overflow-x: auto;
            flex-shrink: 0;
            scrollbar-width: thin;
            scrollbar-color: #00b4fc transparent;
            -webkit-overflow-scrolling: touch;
        }
        .weather-tabs::-webkit-scrollbar { height: 3px; }
        .weather-tabs::-webkit-scrollbar-thumb { background: #00b4fc; border-radius: 3px; }

        .weather-tab {
            padding: 14px 20px;
            color: #adb5bd;
            font-size: 15px; font-weight: 500;
            cursor: pointer; white-space: nowrap;
            position: relative;
            transition: color 0.2s;
            border: none; background: none;
            flex-shrink: 0;
        }
        .weather-tab:hover { color: #ffd43b; }
        .weather-tab.active { color: #00b4fc; }
        .weather-tab.active::after {
            content: '';
            position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px;
            background: #00b4fc;
            box-shadow: 0 0 10px rgba(0,180,252,0.8);
        }
        .weather-tab:focus {
            outline: 2px solid #00b4fc; outline-offset: -2px; border-radius: 4px;
        }

        /* ── Panels ── */
        .weather-content { flex: 1; position: relative; overflow: hidden; }

        .weather-panel {
            display: none; position: absolute; inset: 0;
        }
        .weather-panel.active { display: flex; flex-direction: column; }

        /* Iframe with lazy load and skeleton */
        .panel-iframe-container {
            flex: 1; position: relative; overflow: hidden;
        }
        .panel-skeleton {
            position: absolute; inset: 0; z-index: 2;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 10px; color: #adb5bd; font-size: 14px;
            background: rgba(14,19,54,0.95);
            transition: opacity 0.4s;
        }
        .panel-skeleton.loaded { opacity: 0; pointer-events: none; }

        .ocean-iframe {
            position: absolute; inset: 0;
            width: 100%; height: 100%; border: none;
        }

        .data-source {
            flex-shrink: 0;
            background: rgba(14,19,54,0.85);
            color: #adb5bd;
            padding: 6px 16px;
            font-size: 12px;
            display: flex; align-items: center; gap: 6px;
            border-top: 1px solid rgba(0,180,252,0.15);
        }
        .data-source a { color: #00b4fc; text-decoration: none; }
        .data-source a:hover, .data-source a:focus { text-decoration: underline; }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .sidebar { width: 65vw; max-width: 220px; }
            .sidebar.collapsed { transform: translateX(-65vw); }
            .main-content { margin-left: 0; }
            .weather-tab { padding: 12px 14px; font-size: 13px; }
        }
        @media (max-width: 600px) {
            .navbar { padding: 0 12px; }
            .brand { font-size: 16px; }
            .sidebar { transform: translateX(-100%); }
            .weather-tab { padding: 12px 10px; font-size: 12px; }
        }
        @media (prefers-reduced-motion: reduce) {
            .navbar, .sidebar, .main-content { transition: none; }
            .skeleton { animation: none; background: #1a2550; }
            .brand { animation: none; }
        }
    </style>
</head>
<body>

        <div class="sidebar-content" id="sidebarContent">

    <div class="main-content" id="mainContent">

            <div class="weather-container">
                <!-- Tabs -->

    <script>
        // ─── Lazy Iframe Loading ──────────────────────────────────────────
        // Only load iframe src when its tab becomes active (saves bandwidth)
        const loadedTabs = new Set();

        function loadIframeForTab(tabId) {
            if (loadedTabs.has(tabId)) return;
            loadedTabs.add(tabId);

            const panel = document.getElementById(`${tabId}-panel`);
            if (!panel) return;
            const iframe = panel.querySelector('iframe[data-src]');
            const skeleton = document.getElementById(`${tabId}-skeleton`);

            if (!iframe) return;

            iframe.addEventListener('load', () => {
                if (skeleton) {
                    skeleton.setAttribute('aria-busy', 'false');
                    skeleton.classList.add('loaded');
                    // Remove skeleton from DOM after fade
                    setTimeout(() => skeleton.remove(), 400);
                }
            });

            iframe.addEventListener('error', () => {
                if (skeleton) {
                    skeleton.classList.remove('skeleton');
                    skeleton.style.animation = 'none';
                    skeleton.innerHTML = `
                        <div role="alert" style="color:#e74c3c;font-size:13px;padding:20px;text-align:center;">
                            ⚠️ 内容加载失败，可能是网络问题或该网站不支持嵌入。
                            <br><br>
                            <a href="${iframe.getAttribute('data-src')}" target="_blank" rel="noopener noreferrer"
                               style="color:#00b4fc;text-decoration:none;">在新标签页中打开 →</a>
                        </div>
                    `;
                }
            });

            // Set src to trigger load
            iframe.src = iframe.getAttribute('data-src');
            iframe.removeAttribute('data-src');
        }

        // ─── Tab Switching ────────────────────────────────────────────────
        const tabs = document.querySelectorAll('.weather-tab');
        const panels = document.querySelectorAll('.weather-panel');

        function activateTab(tab) {
            const tabId = tab.getAttribute('data-tab');

            // Update tab states
            tabs.forEach(t => {
                const isActive = t === tab;
                t.classList.toggle('active', isActive);
                t.setAttribute('aria-selected', isActive.toString());
            });

            // Update panel visibility
            panels.forEach(panel => panel.classList.remove('active'));
            const activePanel = document.getElementById(`${tabId}-panel`);
            if (activePanel) activePanel.classList.add('active');

            // Lazy-load the iframe
            loadIframeForTab(tabId);
        }

        tabs.forEach(tab => {
            tab.addEventListener('click', () => activateTab(tab));
            // Keyboard navigation
            tab.addEventListener('keydown', (e) => {
                const tabList = Array.from(tabs);
                const idx = tabList.indexOf(tab);
                if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    tabList[(idx + 1) % tabList.length].focus();
                } else if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    tabList[(idx - 1 + tabList.length) % tabList.length].focus();
                }
            });
        });

        // Load first tab eagerly
        document.addEventListener('DOMContentLoaded', () => {
            loadIframeForTab('tide');
        });
    </script>
</body>
