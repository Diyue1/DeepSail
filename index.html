<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DeepSail 远洋气象导航系统 - 实时航线监控、海洋气象预报与全球港口信息">
    <meta name="theme-color" content="#00b4fc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DeepSail">

    <title>DeepSail - 远洋导航</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/pictures/图片1.png">

    <!-- Preconnect to external domains for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">

    <!-- Google Fonts: display=swap for non-blocking font load -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Shared utilities (loaded first) -->
    <script src="/js/common.js" defer></script>

    <style>
        :root {
            --blue-deep: #0e1336;
            --blue-glow: #00b4fc;
            --blue-dark: #202748;
            --gold: #ffd43b;
            --navy: #131c37;
            --theme-light-bg: linear-gradient(135deg, #eff6ff 0%, #b6e2ff 100%);
            --theme-dark-bg: linear-gradient(135deg, #0e1336 0%, #202748 80%, #1d2548 100%);
        }

        /* ── Skeleton Loader ── */
        .skeleton {
            background: linear-gradient(90deg, #1a2550 25%, #263060 50%, #1a2550 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.5s infinite;
            border-radius: 4px;
        }
        @keyframes skeleton-shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton-globe {
            width: 100%;
            height: 100%;
            min-height: 60vh;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }
        .globe-loading-spinner {
            width: 56px; height: 56px;
            border: 4px solid rgba(0,180,252,0.2);
            border-top-color: #00b4fc;
            border-radius: 50%;
            animation: globeSpin 1s linear infinite;
            box-shadow: 0 0 20px rgba(0,180,252,0.3);
        }
        @keyframes globeSpin { to { transform: rotate(360deg); } }
        .globe-loading-text {
            color: rgba(0,180,252,0.7);
            font-size: 14px;
            letter-spacing: 2px;
            animation: textPulse 1.5s ease-in-out infinite alternate;
        }
        @keyframes textPulse {
            from { opacity: 0.5; } to { opacity: 1; }
        }

        html, body {
            min-height: 100vh;
            background: var(--theme-dark-bg);
            color: #fff;
            font-family: 'Roboto', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* ── Navbar ── */
        .navbar {
            width: 100vw;
            height: 64px;
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(24,32,61,0.92);
            box-shadow: 0 2px 12px #0e133622;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 0 24px;
            transition: background 0.2s, transform 0.3s;
        }
        .navbar.hidden { transform: translateY(-100%); }

        .navbar .brand {
            font-size: 25px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #00b4fc;
            margin-right: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            user-select: none;
            animation: brandGlow 2.8s infinite alternate;
        }
        @keyframes brandGlow {
            0% { filter: drop-shadow(0 0 4px #00b4fc); }
            100% { filter: drop-shadow(0 0 14px #00f6fc); }
        }

        .navbar .nav-menu { display: flex; gap: 14px; align-items: center; }

        .nav-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(90deg, #00b4fc 0%, #2563eb 100%);
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 2px 8px #00b4fc33;
            transition: background 0.16s, color 0.18s, box-shadow 0.16s;
            text-decoration: none;
            display: inline-block;
        }
        .nav-btn:hover, .nav-btn:focus {
            color: #ffd43b;
            background: linear-gradient(90deg, #2563eb 0%, #00b4fc 100%);
            box-shadow: 0 0 14px #00f6fc88;
            outline: 2px solid #00b4fc;
            outline-offset: 2px;
        }
        .nav-btn:focus:not(:focus-visible) { outline: none; }

        .theme-toggle {
            background: none;
            border: none;
            color: #fff;
            font-size: 21px;
            margin-left: 18px;
            cursor: pointer;
            transition: color 0.18s;
            padding: 4px;
            border-radius: 4px;
        }
        .theme-toggle:hover, .theme-toggle:focus { color: #ffd43b; }

        .navbar .nav-right { display: flex; align-items: center; }

        .login-btn {
            background: linear-gradient(90deg, #ffd43b 15%, #ffec70 100%);
            color: #1a237e;
            border: none;
            border-radius: 18px;
            padding: 7px 26px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 2px 7px #ffd43b33;
            transition: background 0.17s, color 0.14s;
            margin-left: 8px;
            margin-right: 80px;
        }
        .login-btn:hover, .login-btn:focus {
            background: #fff066;
            color: #202748;
            outline: 2px solid #ffd43b;
        }

        #userAvatarWrap {
            display: none;
            align-items: center;
            gap: 6px;
            margin-right: 48px;
        }
        .avatar-img {
            width: 38px; height: 38px; border-radius: 50%;
            border: 2px solid #00b4fc;
            background: #fff;
            object-fit: cover;
            cursor: pointer;
            transition: border 0.14s, box-shadow 0.14s;
        }
        .avatar-img:hover { border-color: #ffd43b; box-shadow: 0 0 10px #ffd43b; }
        .username { font-size: 15px; color: #ffd43b; font-weight: 500; cursor: pointer; }

        /* ── Sidebar ── */
        .sidebar {
            position: fixed;
            left: 0; top: 64px; bottom: 0;
            width: 230px;
            background: rgba(22,32,61,0.98);
            box-shadow: 2px 0 18px #1a237e22;
            z-index: 30;
            transition: transform 0.3s cubic-bezier(.65,0,.42,1.04);
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 24px 12px 0;
        }
        .sidebar.collapsed { transform: translateX(-230px); }
        .sidebar-toggle {
            position: absolute;
            top: 22px; right: -18px;
            background: #00b4fc;
            color: #fff;
            border: none; border-radius: 10px 0 0 10px;
            width: 36px; height: 36px;
            font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 2px 0 8px #00b4fc33;
        }
        .sidebar-btn {
            background: linear-gradient(90deg, #2563eb 0%, #00b4fc 100%);
            border: none;
            color: #fff; font-size: 15px; font-weight: 500;
            border-radius: 10px;
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.17s, color 0.16s;
            text-align: left;
            text-decoration: none;
            display: block;
        }
        .sidebar-btn.active, .sidebar-btn:hover, .sidebar-btn:focus {
            color: #ffd43b;
            background: linear-gradient(90deg, #00b4fc 0%, #2563eb 100%);
            outline: none;
        }
        .sidebar-content {
            margin-top: 16px;
            color: #adb5bd;
            font-size: 14px;
            padding: 0 4px;
            line-height: 1.8;
        }

        /* ── Main Content ── */
        .main-content {
            margin-left: 230px;
            transition: margin-left 0.3s cubic-bezier(.65,0,.42,1.04);
        }
        .main-content.expanded { margin-left: 0; }

        #main-globe-area {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
            margin-top: 64px;
            height: calc(100vh - 64px);
        }
        #globeViz {
            flex: 1;
            height: 100%;
            width: 100%;
            background: transparent;
            animation: floatGlobe 6s ease-in-out infinite alternate;
        }
        @keyframes floatGlobe {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-16px) scale(1.03); }
        }

        /* ── Particle Background ── */
        #particle-bg {
            position: fixed;
            inset: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Navbar Toggle ── */
        .navbar-toggle {
            position: fixed;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            z-index: 50;
            background: #00b4fc;
            color: #fff;
            border: none;
            border-radius: 0 10px 10px 0;
            width: 36px; height: 36px;
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 2px 0 8px #00b4fc33;
            transition: all 0.3s;
            opacity: 0.85;
        }
        .navbar-toggle:hover, .navbar-toggle:focus { opacity: 1; background: #2563eb; }

        /* ── Mobile Responsive ── */
        @media (max-width: 1024px) {
            .nav-btn { padding: 7px 14px; font-size: 14px; }
        }
        @media (max-width: 900px) {
            .sidebar { width: 65vw; max-width: 220px; padding: 16px 8px; }
            .sidebar.collapsed { transform: translateX(-65vw); }
            .main-content { margin-left: 0; }
            .login-btn { margin-right: 40px; }
        }
        @media (max-width: 768px) {
            .navbar .nav-menu { gap: 6px; }
            .nav-btn { padding: 6px 10px; font-size: 13px; }
            .navbar .brand { font-size: 18px; }
        }
        @media (max-width: 600px) {
            .navbar { padding: 0 12px; }
            .navbar .brand { font-size: 16px; gap: 6px; }
            .navbar .brand svg { width: 22px; height: 22px; }
            .nav-btn { display: none; } /* Hide nav buttons on mobile - use sidebar */
            .sidebar { padding-top: 20px; transform: translateX(-100%); }
            .sidebar.collapsed { transform: translateX(-100%); }
            #main-globe-area { height: calc(100svh - 64px); }
        }

        /* ── Reduced Motion ── */
        @media (prefers-reduced-motion: reduce) {
            .navbar, .sidebar, .main-content { transition: none; }
            #globeViz { animation: none; }
            .brand { animation: none; }
            .skeleton { animation: none; }
            .globe-loading-spinner { animation: none; }
            .globe-loading-text { animation: none; opacity: 1; }
        }

        /* ── High Contrast ── */
        @media (prefers-contrast: high) {
            .nav-btn { border: 2px solid #fff; }
            .sidebar-btn { border: 1px solid #00b4fc; }
        }
    </style>
</head>
<body>
    <!-- Skip navigation for accessibility -->
    <a href="#main-globe-area" class="skip-nav" style="
        position:absolute;top:-40px;left:16px;background:#00b4fc;color:#fff;
        padding:8px 16px;border-radius:4px;text-decoration:none;z-index:9999;
        transition:top 0.2s;
    " onfocus="this.style.top='8px'" onblur="this.style.top='-40px'">跳转到主要内容</a>

    <canvas id="particle-bg" aria-hidden="true"></canvas>

    <!-- Navbar show/hide toggle -->
    <button class="navbar-toggle" id="navbarToggle"
            aria-label="显示导航栏" aria-controls="navbar" aria-expanded="false">▼</button>

    <!-- Top Navigation Bar -->
    <nav class="navbar" id="navbar" role="navigation" aria-label="主导航">
        <div class="brand" aria-label="DeepSail 远洋导航">
            <svg width="29" height="29" viewBox="0 0 100 100" aria-hidden="true" focusable="false">
                <circle cx="50" cy="50" r="46" fill="none" stroke="#00b4fc" stroke-width="7"/>
                <circle cx="50" cy="50" r="33" fill="#ffd43b" opacity="0.20"/>
                <circle cx="50" cy="50" r="23" fill="#00b4fc" opacity="0.60"/>
            </svg>
            远洋导航
        </div>
        <div class="nav-menu" role="menubar">
            <a class="nav-btn" href="index.html" role="menuitem" aria-current="page">主页</a>
            <a class="nav-btn" href="route.html" role="menuitem">航线</a>
            <a class="nav-btn" href="weather.html" role="menuitem">气象</a>
            <a class="nav-btn" href="port.html" role="menuitem">港口</a>
            <button class="theme-toggle" id="themeBtn" aria-label="切换深色/浅色主题" title="切换主题">🌓</button>
        </div>
        <div class="nav-right">
            <div id="userAvatarWrap" aria-label="用户信息" role="status">
                <img src="" alt="用户头像" class="avatar-img" id="userAvatar"
                     loading="lazy" aria-label="点击更换头像">
                <span class="username" id="userName" aria-label="用户名"></span>
            </div>
            <button class="login-btn" id="loginBtn" aria-label="登录系统">登录</button>
        </div>
    </nav>

    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar" role="complementary" aria-label="功能导航侧边栏">
        <button class="sidebar-toggle" id="sidebarToggleBtn"
                aria-label="收起侧边栏" aria-controls="sidebar" aria-expanded="true">◀</button>
        <a class="sidebar-btn active" href="index.html" role="menuitem" aria-current="page">🏠 主页</a>
        <a class="sidebar-btn" href="weather.html" role="menuitem">🌦️ 气象风速</a>
        <a class="sidebar-btn" href="route.html" role="menuitem">🛳️ 航线监控</a>
        <a class="sidebar-btn" href="port.html" role="menuitem">⚓ 港口信息</a>
        <div class="sidebar-content" id="sidebarContent" aria-live="polite">
            3D地球，支持交互旋转缩放。
        </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <main id="main-globe-area" tabindex="-1" aria-label="3D地球可视化区域">
            <!-- Skeleton loader shown while globe.gl loads -->
            <div id="globe-skeleton" class="skeleton skeleton-globe" aria-busy="true" aria-label="地球加载中">
                <div class="globe-loading-spinner" aria-hidden="true"></div>
                <div class="globe-loading-text">LOADING GLOBE...</div>
            </div>
            <div id="globeViz" aria-label="3D互动地球" role="img" style="display:none;"></div>
        </main>
    </div>

    <script>
        // ─── Performance timing ───────────────────────────────────────────
        performance.mark('page-start');

        // ─── Particle Background (lightweight canvas) ──────────────────────
        (function initParticles() {
            const canvas = document.getElementById('particle-bg');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let animFrame;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();

            // Create particles lazily
            function createParticles() {
                particles = Array.from({ length: 60 }, () => ({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.5 + 0.3,
                    vx: (Math.random() - 0.5) * 0.3,
                    vy: (Math.random() - 0.5) * 0.3,
                    alpha: Math.random() * 0.6 + 0.2
                }));
            }
            createParticles();

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (const p of particles) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 180, 252, ${p.alpha})`;
                    ctx.fill();
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                }
                animFrame = requestAnimationFrame(draw);
            }
            draw();

            // Pause when tab is hidden to save resources
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    cancelAnimationFrame(animFrame);
                } else {
                    draw();
                }
            });

            window.addEventListener('resize', () => {
                resize();
                createParticles();
            });
        })();

        // ─── Globe Initialization (Lazy-loaded) ───────────────────────────
        let world;

        async function initGlobe() {
            const skeleton = document.getElementById('globe-skeleton');
            const container = document.getElementById('globeViz');

            try {
                // Lazy-load globe.gl only when needed
                await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = 'https://cdn.jsdelivr.net/npm/globe.gl@2/dist/globe.gl.min.js';
                    script.onload = resolve;
                    script.onerror = reject;
                    document.head.appendChild(script);
                });

                // Show globe, hide skeleton
                skeleton.style.display = 'none';
                container.style.display = 'block';

                world = new Globe(container)
                    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
                    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png');

                world.controls().autoRotate = true;
                world.controls().autoRotateSpeed = 0.35;

                addTextOverlay(container);
                performance.mark('globe-ready');

            } catch (err) {
                console.error('Globe init failed:', err);
                skeleton.innerHTML = `
                    <div role="alert" style="display:flex;align-items:center;justify-content:center;
                         height:100%;flex-direction:column;gap:12px;color:#adb5bd;">
                        <span style="font-size:48px;">🌍</span>
                        <p>3D地球加载失败，请刷新页面</p>
                        <button onclick="location.reload()" style="
                            padding:8px 20px;background:#00b4fc;border:none;border-radius:20px;
                            color:#fff;cursor:pointer;font-size:14px;">刷新页面</button>
                    </div>
                `;
            }
        }

        function addTextOverlay(container) {
            container.style.position = 'relative';

            const overlay = document.createElement('div');
            overlay.style.cssText = `
                position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
                text-align:center;z-index:10;pointer-events:none;
                width:80%;max-width:600px;
            `;
            overlay.innerHTML = `
                <div style="font-size:clamp(24px,5vw,60px);font-weight:bold;
                     letter-spacing:clamp(2px,0.5vw,8px);color:#fff;
                     text-shadow:0 0 15px rgba(0,180,252,0.8);font-family:Arial,sans-serif;">
                    DEEPSAIL
                </div>
                <div style="width:100%;height:3px;margin:clamp(6px,1vw,12px) 0;
                     background:linear-gradient(90deg,rgba(255,255,255,0.3) 0%,rgba(0,180,252,1) 50%,rgba(255,255,255,0.3) 100%);
                     box-shadow:0 0 10px rgba(0,180,252,0.8);"></div>
                <div style="font-size:clamp(14px,2vw,28px);font-weight:500;
                     background:linear-gradient(to bottom,#fff,#00b4fc);
                     -webkit-background-clip:text;background-clip:text;
                     -webkit-text-fill-color:transparent;font-family:'Microsoft YaHei',sans-serif;">
                    远洋气象导航系统
                </div>
            `;
            overlay.setAttribute('aria-hidden', 'true');
            container.appendChild(overlay);
        }

        // ─── Login / User Avatar ──────────────────────────────────────────
        const loginBtn = document.getElementById('loginBtn');
        const userAvatarWrap = document.getElementById('userAvatarWrap');
        const userAvatar = document.getElementById('userAvatar');
        const userName = document.getElementById('userName');
        let currentUser = null;

        function randomAvatar(seed) {
            return `https://api.dicebear.com/7.x/adventurer/svg?seed=${encodeURIComponent(seed || Math.random())}`;
        }

        function renderUserUI() {
            if (currentUser) {
                loginBtn.style.display = 'none';
                userAvatarWrap.style.display = 'flex';
                userAvatar.src = currentUser.avatar;
                userAvatar.alt = `${currentUser.name}的头像`;
                userName.textContent = currentUser.name;
            } else {
                loginBtn.style.display = '';
                userAvatarWrap.style.display = 'none';
            }
        }

        loginBtn.addEventListener('click', () => {
            currentUser = { name: '海洋探索者', avatar: randomAvatar('ocean_user') };
            renderUserUI();
        });

        userAvatar.addEventListener('click', () => {
            if (currentUser) {
                currentUser.avatar = randomAvatar();
                userAvatar.src = currentUser.avatar;
            }
        });

        userName.addEventListener('click', () => {
            if (currentUser) {
                const nn = prompt('请输入新昵称（10字以内）', currentUser.name);
                if (nn && nn.trim() && nn.length <= 10) {
                    currentUser.name = nn.trim();
                    userName.textContent = currentUser.name;
                }
            }
        });

        renderUserUI();

        // ─── Start Globe on load ──────────────────────────────────────────
        window.addEventListener('load', () => {
            // Use IntersectionObserver for true lazy loading
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) {
                    observer.disconnect();
                    initGlobe();
                }
            }, { threshold: 0.1 });
            observer.observe(document.getElementById('globe-skeleton'));
        });
    </script>
</body>
</html>
