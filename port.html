<html lang="zh-CN">
<head>

    <style>
        :root {
            --blue-deep: #0e1336;
            --blue-glow: #00b4fc;
            --blue-dark: #202748;
            --gold: #ffd43b;
            --navy: #131c37;
            --theme-light-bg: linear-gradient(135deg, #eff6ff 0%, #b6e2ff 100%);
            --theme-dark-bg: linear-gradient(135deg, #0e1336 0%, #202748 80%, #1d2548 100%);
        }
        html, body {
            min-height: 100vh;
            background: var(--theme-dark-bg);
            color: #fff;
            font-family: 'Roboto', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* ── Skeleton ── */
        .skeleton {
            background: linear-gradient(90deg, #1a2550 25%, #263060 50%, #1a2550 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.5s infinite;
        }
        @keyframes skeleton-shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .map-skeleton {
            position: absolute; inset: 0; z-index: 5;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 14px; color: #adb5bd; font-size: 14px;
        }
        .loading-spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(0,180,252,0.3);
            border-top-color: #00b4fc;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Navbar ── */
        .navbar {
            width: 100vw; height: 64px;
            position: fixed; top: 0; left: 0; right: 0; z-index: 40;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(24,32,61,0.92);
            box-shadow: 0 2px 12px #0e133622;
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            padding: 0 24px;
            transition: background 0.2s, transform 0.3s;
        }
        .navbar.hidden { transform: translateY(-100%); }
        .brand {
            font-size: 22px; font-weight: 700; color: #00b4fc;
            display: flex; align-items: center; gap: 10px;
            user-select: none; animation: brandGlow 2.8s infinite alternate;
        }
        @keyframes brandGlow {
            0% { filter: drop-shadow(0 0 4px #00b4fc); }
            100% { filter: drop-shadow(0 0 14px #00f6fc); }
        }
        .navbar .nav-menu { display: flex; gap: 10px; align-items: center; }
        .nav-btn {
            padding: 7px 18px; border: none; border-radius: 20px;
            background: linear-gradient(90deg, #00b4fc 0%, #2563eb 100%);
            color: #fff; font-size: 14px; font-weight: 500; cursor: pointer;
            transition: background 0.16s; text-decoration: none; display: inline-block;
        }
        .nav-btn:hover, .nav-btn:focus {
            color: #ffd43b;
            background: linear-gradient(90deg, #2563eb 0%, #00b4fc 100%);
            outline: 2px solid #00b4fc; outline-offset: 2px;
        }
        .nav-btn.active { color: #ffd43b; }
        .theme-toggle {
            background: none; border: none; color: #fff;
            font-size: 21px; margin-left: 12px; cursor: pointer; padding: 4px;
        }
        .theme-toggle:hover { color: #ffd43b; }
        .navbar-toggle {
            position: fixed; top: 50%; left: 0; transform: translateY(-50%);
            z-index: 50; background: #00b4fc; color: #fff;
            border: none; border-radius: 0 10px 10px 0;
            width: 36px; height: 36px; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            opacity: 0.85; transition: all 0.3s;
        }
        .navbar-toggle:hover { opacity: 1; background: #2563eb; }

        /* ── Sidebar ── */
        .sidebar {
            position: fixed; left: 0; top: 64px; bottom: 0;
            width: 230px; background: rgba(22,32,61,0.98);
            box-shadow: 2px 0 18px #1a237e22; z-index: 30;
            transition: transform 0.3s cubic-bezier(.65,0,.42,1.04);
            display: flex; flex-direction: column; gap: 10px;
            padding: 24px 12px 0;
        }
        .sidebar.collapsed { transform: translateX(-230px); }
        .sidebar-toggle {
            position: absolute; top: 22px; right: -18px;
            background: #00b4fc; color: #fff;
            border: none; border-radius: 10px 0 0 10px;
            width: 36px; height: 36px; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .sidebar-btn {
            background: linear-gradient(90deg, #2563eb 0%, #00b4fc 100%);
            border: none; color: #fff; font-size: 15px; font-weight: 500;
            border-radius: 10px; padding: 10px 16px; cursor: pointer;
            transition: background 0.17s; text-align: left;
            text-decoration: none; display: block;
        }
        .sidebar-btn.active, .sidebar-btn:hover, .sidebar-btn:focus {
            color: #ffd43b;
            background: linear-gradient(90deg, #00b4fc 0%, #2563eb 100%);
            outline: none;
        }
        .sidebar-content {
            margin-top: 8px; color: #adb5bd; font-size: 13px; line-height: 1.8; padding: 0 4px;
        }
        .sidebar-content ul { padding-left: 16px; margin: 6px 0; }
        .sidebar-content li { margin-bottom: 3px; }

        /* ── Layout ── */
        .main-content {
            margin-left: 230px;
            transition: margin-left 0.3s cubic-bezier(.65,0,.42,1.04);
            height: calc(100vh - 64px);
            margin-top: 64px;
            display: flex; flex-direction: column;
        }
        .main-content.expanded { margin-left: 0; }

        /* ── Port Map Container ── */
        .port-map-container {
            flex: 1; display: flex; flex-direction: column;
            padding: 16px; overflow: hidden;
        }

        /* ── Iframe header ── */
        .iframe-header {
            background: rgba(24,32,61,0.95);
            color: #fff;
            padding: 12px 16px;
            border-radius: 10px 10px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            flex-shrink: 0;
        }
        .iframe-header h2 {
            margin: 0; font-size: 16px; color: #00b4fc;
        }
        .iframe-controls { display: flex; gap: 6px; flex-wrap: wrap; }
        .region-btn {
            background: rgba(24,32,61,0.85);
            color: #adb5bd;
            border: 1px solid rgba(0,180,252,0.2);
            border-radius: 14px;
            padding: 5px 14px;
            cursor: pointer; font-size: 13px;
            transition: all 0.2s;
        }
        .region-btn:hover, .region-btn:focus {
            background: rgba(0,180,252,0.2);
            color: #fff;
            outline: 2px solid #00b4fc;
        }
        .region-btn.active-region {
            background: linear-gradient(90deg, #2563eb 0%, #00b4fc 100%);
            color: #ffd43b;
            border-color: #00b4fc;
        }

        /* ── Map area ── */
        #vf-map-container {
            flex: 1;
            position: relative;
            background: #1a2550;
            border-radius: 0 0 10px 10px;
            overflow: hidden;
            min-height: 300px;
        }
        #amap-container {
            width: 100%; height: 100%;
        }

        /* ── Info Panel ── */
        .info-panel {
            position: absolute;
            top: 12px; left: 12px;
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            padding: 16px;
            max-width: 280px;
            max-height: 380px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            color: #111;
            display: none;
            animation: slideIn 0.2s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .info-panel.visible { display: block; }
        .panel-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #e0e6ed;
            padding-bottom: 8px;
        }
        .panel-header h3 {
            margin: 0; font-size: 15px; color: #1a237e; font-weight: 600;
        }
        .close-btn {
            background: none; border: none; cursor: pointer;
            font-size: 20px; color: #999; line-height: 1;
            padding: 0 4px;
        }
        .close-btn:hover { color: #333; }
        #panel-content p {
            margin: 6px 0; font-size: 13px; color: #222; line-height: 1.5;
        }
        #panel-content strong { color: #1a237e; }

        /* Custom info window */
        .custom-info { font-size: 13px; color: #111; }
        .custom-info-title {
            font-weight: 600; font-size: 14px; color: #1a237e;
            border-bottom: 1px solid #e0e6ed;
            padding-bottom: 6px; margin-bottom: 8px;
        }
        .custom-info-content p { margin: 5px 0; color: #222; }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .sidebar { width: 65vw; max-width: 220px; }
            .sidebar.collapsed { transform: translateX(-65vw); }
            .main-content { margin-left: 0; }
            .iframe-header { flex-direction: column; align-items: flex-start; }
            .info-panel { max-width: 220px; }
        }
        @media (max-width: 600px) {
            .navbar { padding: 0 12px; }
            .brand { font-size: 16px; }
            .sidebar { transform: translateX(-100%); }
            .port-map-container { padding: 8px; }
            .region-btn { padding: 4px 10px; font-size: 12px; }
            .info-panel { left: 8px; right: 8px; max-width: none; }
        }
        @media (prefers-reduced-motion: reduce) {
            .navbar, .sidebar, .main-content { transition: none; }
            .skeleton { animation: none; background: #1a2550; }
            .loading-spinner { animation: none; }
            .info-panel { animation: none; }
            .brand { animation: none; }
        }
    </style>
</head>

        const VESSELS = [
            { id: 1, name: "远洋之星", type: "集装箱船", mmsi: "123456789", position: [121.45, 31.2], speed: 14, heading: 90, destination: "上海港", flag: "中国", length: 366, width: 51, draft: 15.2, callsign: "BOEJ4" },

            { id: 4, name: "龙腾号", type: "集装箱船", mmsi: "456789012", position: [113.4, 23.1], speed: 15, heading: 185, destination: "广州港", flag: "中国", length: 299, width: 43, draft: 14.5, callsign: "BVCX7" },
            { id: 5, name: "星辉号", type: "滚装船", mmsi: "567890123", position: [103.8, 1.25], speed: 18, heading: 5, destination: "新加坡港", flag: "新加坡", length: 199, width: 32, draft: 9.8, callsign: "9VQW3" },
            { id: 6, name: "泰荣", type: "油轮", mmsi: "678901234", position: [129.0, 35.1], speed: 8, heading: 50, destination: "釜山港", flag: "韩国", length: 248, width: 43, draft: 15.0, callsign: "HLSD9" },
            { id: 16, name: "欧华号", type: "集装箱船", mmsi: "789012345", position: [4.4, 51.9], speed: 16, heading: 335, destination: "鹿特丹港", flag: "荷兰", length: 350, width: 48, draft: 14.8, callsign: "PJKL7" },
            { id: 17, name: "北海女神", type: "油轮", mmsi: "235678901", position: [8.7, 53.8], speed: 13, heading: 295, destination: "汉堡港", flag: "德国", length: 285, width: 46, draft: 15.5, callsign: "DERT5" },
            { id: 26, name: "太平洋之星", type: "散货船", mmsi: "890123456", position: [-118.27, 33.75], speed: 11, heading: 230, destination: "洛杉矶港", flag: "美国", length: 245, width: 36, draft: 13.0, callsign: "WDC23" },
            { id: 27, name: "大西洋勇士", type: "集装箱船", mmsi: "345789012", position: [-74.0, 40.7], speed: 15, heading: 50, destination: "纽约港", flag: "美国", length: 320, width: 45, draft: 14.5, callsign: "WFG45" }
        ];

        // ─── Map State ─────────────────────────────────────────────────────
        let map = null;
        let portMarkers = [];
        let vesselMarkers = [];
        let infoWindow = null;

        // ─── Load Amap dynamically ─────────────────────────────────────────
        async function loadMapAndInit() {
            try {
                const configRes = await fetch('/api/config');
                if (!configRes.ok) throw new Error('配置加载失败');
                const config = await configRes.json();

                await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = `https://webapi.amap.com/maps?v=2.0&key=${config.amapKey}`;
                    script.onload = resolve;
                    script.onerror = () => reject(new Error('高德地图SDK加载失败'));
                    document.head.appendChild(script);
                });

                initMap();
            } catch (err) {
                const skeleton = document.getElementById('map-skeleton');
                if (skeleton) {
                    skeleton.classList.remove('skeleton');
                    skeleton.style.animation = 'none';
                    skeleton.style.background = 'rgba(14,19,54,0.9)';
                    skeleton.innerHTML = `
                        <div role="alert" style="color:#e74c3c;font-size:14px;text-align:center;padding:20px;">
                            ⚠️ ${err.message || '地图加载失败'}
                            <br><br>
                            <button onclick="location.reload()" style="
                                padding:8px 20px;background:#00b4fc;border:none;border-radius:20px;
                                color:#fff;cursor:pointer;font-size:13px;">刷新页面</button>
                        </div>
                    `;
                }
            }
        }

        function initMap() {
            // Remove skeleton
            const skeleton = document.getElementById('map-skeleton');
            if (skeleton) skeleton.remove();

            map = new AMap.Map('amap-container', {
                zoom: 5,
                center: [121.5, 31.3],
                viewMode: '3D',
                mapStyle: 'amap://styles/dark',
                pitch: 0
            });

            infoWindow = new AMap.InfoWindow({
                offset: new AMap.Pixel(0, -30),
                closeWhenClickMap: true
            });

            // Add map controls
            map.plugin(['AMap.ToolBar', 'AMap.Scale'], () => {
                map.addControl(new AMap.ToolBar());
                map.addControl(new AMap.Scale());
            });

            loadRegion('asia');
        }

        // ─── Region Loading ────────────────────────────────────────────────
        function loadRegion(region) {
            // Update button states
            document.querySelectorAll('.region-btn').forEach(btn => {
                const isActive = btn.id === `${region}-btn` ||
                    (region === 'ports' && btn.id === 'ports-btn');
                btn.classList.toggle('active-region', isActive);
                btn.setAttribute('aria-pressed', isActive.toString());
            });

            if (!map) return;

            clearAllMarkers();

            const configs = {
                asia: {
                    center: [121.5, 31.3], zoom: 5,
                    portFilter: p => ['中国','新加坡','韩国'].includes(p.country),
                    vesselFilter: v => v.position[0] > 100 && v.position[0] < 140 && v.position[1] > 0 && v.position[1] < 50
                },
                europe: {
                    center: [5.0, 51.0], zoom: 5,
                    portFilter: p => ['荷兰','比利时','德国'].includes(p.country),
                    vesselFilter: v => v.position[0] > -10 && v.position[0] < 30 && v.position[1] > 35 && v.position[1] < 60
                },
                americas: {
                    center: [-80.0, 25.0], zoom: 4,
                    portFilter: p => p.country === '美国',
                    vesselFilter: v => v.position[0] > -130 && v.position[0] < -65 && v.position[1] > 20 && v.position[1] < 50
                },
                ports: {
                    center: [121.5, 31.3], zoom: 8,
                    portFilter: p => p.position[0] > 120 && p.position[0] < 123 && p.position[1] > 30 && p.position[1] < 32,
                    vesselFilter: v => v.position[0] > 120 && v.position[0] < 123 && v.position[1] > 30 && v.position[1] < 32
                },
                global: {
                    center: [0.0, 25.0], zoom: 2,
                    portFilter: () => true,
                    vesselFilter: () => true
                }
            };

            const cfg = configs[region] || configs.global;
            map.setZoomAndCenter(cfg.zoom, cfg.center);
            addPortsToMap(PORTS.filter(cfg.portFilter));
            addVesselsToMap(VESSELS.filter(cfg.vesselFilter));
            showRegionSummary(region);
        }

        function clearAllMarkers() {
            if (portMarkers.length) { map.remove(portMarkers); portMarkers = []; }
            if (vesselMarkers.length) { map.remove(vesselMarkers); vesselMarkers = []; }
        }

        function addPortsToMap(ports) {
            ports.forEach(port => {
                const marker = new AMap.Marker({
                    position: port.position,
                    title: port.name,
                    icon: new AMap.Icon({
                        size: new AMap.Size(28, 28),
                        image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_r.png',
                        imageSize: new AMap.Size(28, 28)
                    }),
                    anchor: 'bottom-center'
                });
                marker.on('click', () => showPortInfo(port));
                marker.setMap(map);
                portMarkers.push(marker);
            });
        }

        function addVesselsToMap(vessels) {
            vessels.forEach(vessel => {
                const marker = new AMap.Marker({
                    position: vessel.position,
                    title: vessel.name,
                    icon: new AMap.Icon({
                        size: new AMap.Size(28, 28),
                        image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png',
                        imageSize: new AMap.Size(28, 28)
                    }),
                    angle: vessel.heading,
                    anchor: 'center'
                });
                marker.on('click', () => showVesselInfo(vessel));
                marker.setMap(map);
                vesselMarkers.push(marker);
            });
        }

        function showPortInfo(port) {
            const content = `
                <div class="custom-info">
                    <div class="custom-info-title">${port.name} (${port.nameEN})</div>
                    <div class="custom-info-content">
                        <p><strong>国家/地区:</strong> ${port.country}</p>
                        <p><strong>港口类型:</strong> ${port.type}</p>
                        <p><strong>坐标:</strong> ${port.position[0]}°E, ${port.position[1]}°N</p>
                    </div>
                </div>
            `;
            infoWindow.setContent(content);
            infoWindow.open(map, port.position);
        }

        function showVesselInfo(vessel) {
            const content = `
                <div class="custom-info">
                    <div class="custom-info-title">${vessel.name}</div>
                    <div class="custom-info-content">
                        <p><strong>船舶类型:</strong> ${vessel.type}</p>
                        <p><strong>MMSI:</strong> ${vessel.mmsi}</p>
                        <p><strong>航速:</strong> ${vessel.speed} 节</p>
                        <p><strong>航向:</strong> ${vessel.heading}°</p>
                        <p><strong>目的港:</strong> ${vessel.destination}</p>
                        <p><strong>船旗国:</strong> ${vessel.flag}</p>
                        <p><strong>呼号:</strong> ${vessel.callsign}</p>
                        <p><strong>尺寸:</strong> ${vessel.length}m × ${vessel.width}m</p>
                        <p><strong>吃水:</strong> ${vessel.draft}m</p>
                    </div>
                </div>
            `;
            infoWindow.setContent(content);
            infoWindow.open(map, vessel.position);
        }

        function showRegionSummary(region) {
            const summaries = {
                asia: { title: '亚洲主要港口', text: '亚洲拥有世界上最繁忙的集装箱港口。上海港是全球最大的集装箱港口，年吞吐量超过4000万标准箱。' },
                europe: { title: '欧洲主要港口', text: '鹿特丹港是欧洲最大的港口，也是全球重要的物流中心。安特卫普港和汉堡港也是欧洲重要的集装箱枢纽。' },
                americas: { title: '美洲主要港口', text: '洛杉矶港和长滩港构成了美国最大的港口复合体。纽约-新泽西港是美国东海岸最大的港口。' },
                ports: { title: '上海港详情', text: '上海港是当前世界第一大集装箱港口，包括外高桥港区、洋山深水港区和宝山港区等多个港区。' },
                global: { title: '全球主要港口', text: '地图显示了全球各大洲主要港口及船舶位置。点击任意港口或船舶图标查看详细信息。' }
            };

            const info = summaries[region] || summaries.global;
            const panel = document.getElementById('info-panel');
            document.getElementById('panel-title').textContent = info.title;
            document.getElementById('panel-content').innerHTML = `<p>${info.text}</p>`;
            panel.classList.add('visible');

            setTimeout(() => panel.classList.remove('visible'), 6000);
        }

        // ─── Info panel close ──────────────────────────────────────────────
        document.getElementById('close-panel').addEventListener('click', () => {
            document.getElementById('info-panel').classList.remove('visible');
        });

        // ─── Keyboard: close info panel on Escape ─────────────────────────
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('info-panel').classList.remove('visible');
            }
        });

        // ─── Start ─────────────────────────────────────────────────────────
        window.addEventListener('load', loadMapAndInit);
    </script>
</body>
</html>
